<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>〇✕ゲーム</title>
    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 👇 ここを変更（超重要） -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <audio id="winSound" src="win.mp3"></audio>
    
</head>

<body>
    <h1 id="title">Tic Tac Toe 3D</h1>

    <div id="ui">
        <div id="modeButtons">
            <button id="localModeBtn" class="active">Local</button>
            <button id="cpuModeBtn">CPU</button>
        </div>

        <div id="difficultyButtons">
            <button id="easyBtn">Easy</button>
            <button id="normalBtn" class="active">Normal</button>
            <button id="hardBtn">Hard</button>
        </div>

        <p id="layerText">current layer: 1</p>

        <p id="status"></p>

        <div id="buttons">
            <button id="layerUp">top</button>
            <button id ="layerCenter">middle</button>
            <button id="layerDown">bottom</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
